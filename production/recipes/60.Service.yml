apiVersion: v1
kind: Service
metadata:
  name: recipes
  namespace: recipes
  labels:
    app.kubernetes.io/component: recipes
    app.kubernetes.io/name: recipes
    prometheus.monitoring/service: nginx-exporter
spec:
  ports:
    - name: https
      protocol: TCP
      port: 80
      targetPort: recipes 
    - name: metrics
      protocol: TCP
      port: 8080
      targetPort: metrics  
